# Default values for coraza-caddy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Image configuration
image:
  # -- Image repository
  repository: ghcr.io/corazawaf/coraza-caddy
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (SemVer `X.X.X` or git `sha256:digest`)
  tag: ""

# -- Reference to one or more secrets to use for pulling images
imagePullSecrets: []
  # - name: regcred

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the chart
fullnameOverride: ""

# -- Override the namespace
namespaceOverride: ""

# -- Number of replicas
replicaCount: 1

# -- Annotations to add to the pod
podAnnotations: {}

# -- Labels to add to the pod
podLabels: {}

# -- Pod security context
podSecurityContext: {}
  # runAsNonRoot: true
  # runAsUser: 65534
  # runAsGroup: 65534
  # fsGroup: 65534
  # seccompProfile:
  #   type: RuntimeDefault

# -- Container security context
securityContext: {}
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true
  # capabilities:
  #   drop:
  #     - ALL

# -- ServiceAccount configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # -- Specifies whether to automount the service account token
  automountServiceAccountToken: false

# -- Autoscaling configuration
autoscaling:
  # -- Enable autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 4
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 80

# -- Pod Disruption Budget configuration
podDisruptionBudget:
  # -- Enable PodDisruptionBudget
  enabled: false
  # -- Minimum number of pods that must be available (mutually exclusive with maxUnavailable)
  # minAvailable: 1
  # -- Maximum number of pods that can be unavailable (mutually exclusive with minAvailable)
  # maxUnavailable: 1

# -- Resource requests and limits
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- HTTP port that Caddy listens on (must match the port in the Caddyfile)
port: 8080

# -- Liveness probe configuration
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Readiness probe configuration
readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Topology spread constraints for pod scheduling
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: coraza-caddy

# -- Priority class name for the pod
priorityClassName: ""

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 30

# -- Additional volumes to add to the pod
volumes: []
  # tmpfs volume for /tmp (required for readOnlyRootFilesystem)
  # - name: tmp
  #   emptyDir:
  #     medium: Memory
  #     sizeLimit: 1Gi

# -- Additional volume mounts for the main container
volumeMounts: []
  # Mount tmpfs to /tmp (required for readOnlyRootFilesystem)
  # - name: tmp
  #   mountPath: /tmp

# -- Init containers to add to the pod
initContainers: []

# -- Sidecar containers to add to the pod
sidecarContainers: []

# -- Metrics configuration
metrics:
  # -- Enable metrics endpoint (Caddy admin API)
  enabled: false
  # -- Metrics port (Caddy admin API)
  port: 2019
  # -- ServiceMonitor configuration
  serviceMonitor:
    # -- Enable ServiceMonitor for Prometheus Operator
    enabled: false

# -- Caddyfile configuration
# @default -- See values.yaml
caddyfile: |
  {
      order coraza_waf first
  }

  :8080 {
      coraza_waf {
          load_owasp_crs
          directives `
              Include @coraza.conf-recommended
              Include @crs-setup.conf.example
              Include @owasp_crs/*.conf
              SecRuleEngine On
          `
      }
  }
